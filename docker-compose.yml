version: "3.9"
services:
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: micro/ui:latest
    depends_on:
      - api-gateway
    environment:
      - VITE_API_BASE=http://localhost:8080
    ports:
      - "5173:80"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  user-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    ports:
      - "5433:5432"

  inventory-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
    ports:
      - "5434:5432"

  order-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders
    ports:
      - "5435:5432"

  discovery-service:
    build:
      context: ./microservices-app
      dockerfile: discovery-service/Dockerfile
    image: micro/discovery-service:latest
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: ./microservices-app
      dockerfile: api-gateway/Dockerfile
    image: micro/api-gateway:latest
    depends_on:
      - discovery-service
    environment:
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
    ports:
      - "8080:8080"

  user-service:
    build:
      context: ./microservices-app
      dockerfile: user-service/Dockerfile
    image: micro/user-service:latest
    depends_on:
      - user-db
      - kafka
      - discovery-service
    environment:
      DB_URL: jdbc:postgresql://user-db:5432/users
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
    ports:
      - "8081:8081"

  inventory-service:
    build:
      context: ./microservices-app
      dockerfile: inventory-service/Dockerfile
    image: micro/inventory-service:latest
    depends_on:
      - inventory-db
      - kafka
      - discovery-service
    environment:
      DB_URL: jdbc:postgresql://inventory-db:5432/inventory
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
    ports:
      - "8082:8082"

  order-service:
    build:
      context: ./microservices-app
      dockerfile: order-service/Dockerfile
    image: micro/order-service:latest
    depends_on:
      - order-db
      - kafka
      - discovery-service
    environment:
      DB_URL: jdbc:postgresql://order-db:5432/orders
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
    ports:
      - "8083:8083"